	<body
	    class="bg-black text-white h-full w-full"
        x-data="dictionary"
        x-init=")"
	>

	    <input
			type="text" name="start" maxlength="5"
			x-model="word"
			x-init="$watch('word', play)"
		>

		<!--<ul>
		    <template x-for="word in dictionary">
				<li x-text="word"></li>
			</template>
		</ul>-->

		

	</body>

	<script>
      document.addEventListener('alpine:init', () => {
        Alpine.data('dropdown', () => ({
          word: '',
          dictionary: [],

          init() {
            this.dictionary = await loadDictionary()
          },

          async loadDictionary() {
            return await fetch('../assets/hamming/wordle.txt')
              .then(response => response.text())
              .then(text => text.split("\n"));
          },

          function isValid() {
            if (this.word.length != 5) return false;
            if (! /^[a-zA-Z]+$/.test(this.word)) return false;
            return true;
          },

          function play() {
            if (!isValid(this.word)) return;
            console.log(this.word, "is valid");
          },
        }))
      })

	</script>

    <script src="//unpkg.com/alpinejs" defer></script>
